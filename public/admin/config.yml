backend:
  name: git-gateway
  branch: main

media_folder: "public/assets/imagenes/uploads"
public_folder: "/assets/imagenes/uploads"

locale: es

collections:

  - name: "proyectos"
    label: "Proyectos"
    label_singular: "Proyecto"
    folder: "src/content/proyectos"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "titulo", widget: "string" }
      - { label: "Ubicación", name: "ubicacion", widget: "string" }
      - label: "Categoría"
        name: "categoria"
        widget: "select"
        options:
          - "Obras Civiles"
          - "Infraestructura"
          - "Electromecánica"
          - "Paisajismo"
          - "Minería"
          - "Consultoría"
      - { label: "Año", name: "año", widget: "number", value_type: "int" }
      - { label: "Imagen principal", name: "imagen", widget: "image" }
      - label: "Galería de fotos"
        name: "galeria"
        widget: "list"
        required: false
        field: { label: "Foto", name: "foto", widget: "image" }
      - { label: "¿Destacado en home?", name: "destacado", widget: "boolean", default: false }
      - { label: "Orden", name: "orden", widget: "number", default: 99 }
      - { label: "Descripción", name: "body", widget: "markdown" }

  - name: "servicios"
    label: "Servicios"
    label_singular: "Servicio"
    folder: "src/content/servicios"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "titulo", widget: "string" }
      - { label: "Descripción corta", name: "descripcion", widget: "string" }
      - { label: "Imagen", name: "imagen", widget: "image" }
      - { label: "Orden", name: "orden", widget: "number", default: 99 }
      - label: "Especialidades"
        name: "especialidades"
        widget: "list"
        required: false
        field: { label: "Especialidad", name: "item", widget: "string" }
      - { label: "Contenido", name: "body", widget: "markdown" }